<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calque Visuel (Web)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            font-family: sans-serif;
            color: white;
        }
        /* Conteneur principal */
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        /* Flux de la webcam */
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* L'image superposée */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.5;
            cursor: grab;
            max-width: 80%;
            display: none; /* Caché tant qu'aucune image n'est chargée */
            user-select: none;
        }
        #overlay:active {
            cursor: grabbing;
        }
        /* Interface de contrôle */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 300px;
            z-index: 10;
        }
        input[type="file"], input[type="range"] {
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="container">
        <video id="webcam" autoplay playsinline></video>
        
        <img id="overlay" draggable="false" alt="Calque" />

        <div id="controls">
            <label>1. Choisir un calque :</label>
            <input type="file" id="imageInput" accept="image/*">
            
            <label>2. Opacité :</label>
            <input type="range" id="opacitySlider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const overlay = document.getElementById('overlay');
        const imageInput = document.getElementById('imageInput');
        const opacitySlider = document.getElementById('opacitySlider');

        // 1. Activer la Webcam
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("Erreur d'accès à la webcam :", err);
                alert("Impossible d'accéder à la caméra. Vérifiez les permissions.");
            });

        // 2. Charger l'image depuis l'ordinateur/téléphone
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                overlay.src = URL.createObjectURL(file);
                overlay.style.display = 'block'; // Afficher l'image
                
                // Réinitialiser la position
                currentX = 0; currentY = 0;
                setTranslate(0, 0, overlay);
            }
        });

        // 3. Modifier l'opacité
        opacitySlider.addEventListener('input', (e) => {
            overlay.style.opacity = e.target.value;
        });

        // 4. Gérer le déplacement de l'image (Souris et Tactile)
        let isDragging = false;
        let startX, startY, currentX = 0, currentY = 0;

        function dragStart(e) {
            isDragging = true;
            if (e.type === "touchstart") {
                startX = e.touches[0].clientX - currentX;
                startY = e.touches[0].clientY - currentY;
            } else {
                startX = e.clientX - currentX;
                startY = e.clientY - currentY;
            }
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            if (e.type === "touchmove") {
                currentX = e.touches[0].clientX - startX;
                currentY = e.touches[0].clientY - startY;
            } else {
                currentX = e.clientX - startX;
                currentY = e.clientY - startY;
            }
            setTranslate(currentX, currentY, overlay);
        }

        function dragEnd() {
            isDragging = false;
        }

        function setTranslate(xPos, yPos, el) {
            el.style.transform = `translate(${xPos}px, ${yPos}px)`;
        }

        // Écouteurs d'événements pour la souris
        overlay.addEventListener("mousedown", dragStart);
        window.addEventListener("mousemove", drag);
        window.addEventListener("mouseup", dragEnd);

        // Écouteurs d'événements pour le tactile (téléphone)
        overlay.addEventListener("touchstart", dragStart);
        window.addEventListener("touchmove", drag, { passive: false });
        window.addEventListener("touchend", dragEnd);
    </script>
</body>
</html>
